networks:
  polymesh:

services:
  postgres:
    image: postgres:16.1-alpine
    networks:
      - polymesh
    volumes:
      - psql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres

    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 10s
      timeout: 5s
      retries: 5
    configs:
      - source: psql_extensions
        target: /docker-entrypoint-initdb.d/btree_extension.sql

  subquery-node:
    image: ${POLYMESH_SUBQUERY_IMAGE}
    depends_on:
      postgres:
        condition: service_healthy
      polymesh-node:
        condition: service_healthy
    networks:
      - polymesh
    restart: on-failure
    environment:
      DB_USER: postgres
      DB_PASS: postgres
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      START_BLOCK: 1
      NETWORK_ENDPOINT: ${POLYMESH_CHAIN_WS:-ws://polymesh-node:9944}
      NETWORK_HTTP_ENDPOINT: http://polymesh-node:9944
      NETWORK_CHAIN_ID: ${CHAIN_ID:-}
      NODE_ENV: local
    command:
      - --batch-size=500
      - -f=/app
      - --local
    healthcheck:
      test: ['CMD', 'curl', '--fail', 'http://subquery-node:3000/ready']
      interval: 20s
      timeout: 5s
      retries: 20
      start_period: 80s

  subquery-graphql:
    image: ${POLYMESH_SUBQUERY_GRAPHQL_IMAGE}
    depends_on:
      subquery-node:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - polymesh
    ports:
      - ${POLYMESH_SUBQUERY_GRAPHQL_PORT:-3000}:3000
    restart: on-failure
    environment:
      DB_DATABASE: postgres
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASS: postgres
      PORT: 3000
      SUBQL_QUERY_INDEXER: http://subquery-node:3000
      SUBQL_QUERY_NAME: public
      SUBQL_QUERY_OUTPUT_FMT: json
      SUBQL_QUERY_PLAYGROUND: true
      SUBQL_QUERY_LOG_LEVEL: debug
    healthcheck:
      test:
        [
          'CMD',
          'curl',
          '--fail',
          'subquery-graphql:3000/.well-known/apollo/server-health',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  polymesh-node:
    image: ${POLYMESH_CHAIN_IMAGE}
    networks:
      - polymesh
    ports:
      - ${POLYMESH_CHAIN_WS_PORT:-9944}:9944
      - ${POLYMESH_CHAIN_RPC_PORT:-9933}:9944
      - ${POLYMESH_CHAIN_P2P_PORT:-30333}:30333
    volumes:
      - chain-data:/var/lib/polymesh
    command:
      - --base-path=/var/lib/polymesh
      - --unsafe-rpc-external
      - --wasm-execution=compiled
      - --no-prometheus
      - --no-telemetry
      - --pruning=archive
      - --no-mdns
      # - --unsafe-force-node-key-generation
      - --validator
      - --rpc-cors=all
      - --rpc-methods=unsafe
      - --force-authoring
      - --port=30333
      - --alice
      - --dev
    configs:
      - source: polymesh-healthcheck-libp2p
        target: /usr/local/bin/polymesh-healthcheck-libp2p.sh
    healthcheck:
      test: ['CMD', '/usr/local/bin/polymesh-healthcheck-libp2p.sh']
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 60s

  # Polymesh Rest API with Vault Signer
  # https://github.com/PolymeshAssociation/polymesh-rest-api#signing-managers
  polymesh-rest-api-vault-sm:
    image: ${POLYMESH_REST_API_IMAGE}
    depends_on:
      polymesh-node:
        condition: service_healthy
      subquery-graphql:
        condition: service_healthy
      vault-init:
        condition: service_completed_successfully
    networks:
      - polymesh
    ports:
      - ${POLYMESH_REST_API_VAULT_SM_PORT:-3005}:3000
    restart: on-failure
    volumes:
      - vault-root-token:/vault-token:ro
    entrypoint: /bin/sh -c "VAULT_TOKEN=$$(cat /vault-token/.token) node dist/main.js"
    environment:
      PORT: 3000
      POLYMESH_NODE_URL: ${POLYMESH_CHAIN_WS:-ws://polymesh-node:9944}
      POLYMESH_MIDDLEWARE_V2_URL: ${REST_MIDDLEWARE_URL:-http://subquery-graphql:3000}
      AUTH_STRATEGY: 'open'
      DEVELOPER_UTILS: true
      VAULT_URL: 'http://vault:8200/v1/transit'
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--spider',
          '-q',
          'http://polymesh-rest-api-vault-sm:3000/network/latest-block',
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  polymesh-rest-api-vault-sm-init:
    image: alpine:3.19
    depends_on:
      polymesh-rest-api-vault-sm:
        condition: service_healthy
    restart: 'no'
    entrypoint: /opt/polymesh-rest-api/init.sh
    networks:
      - polymesh
    environment:
      PGPASSWORD: postgres
      PGUSER: postgres
      PGDATABASE: services_status
      PGHOST: postgres
    volumes:
      - rest-api-accounts-init:/opt/polymesh-rest-api/status
    configs:
      - source: rest-api-accounts-init
        target: /opt/polymesh-rest-api/init.sh

  # Polymesh Rest API with Local Signers
  # https://github.com/PolymeshAssociation/polymesh-rest-api#signing-managers
  polymesh-rest-api-local-sm:
    image: ${POLYMESH_REST_API_IMAGE}
    depends_on:
      polymesh-node:
        condition: service_healthy
      subquery-graphql:
        condition: service_healthy
    networks:
      - polymesh
    ports:
      - ${POLYMESH_REST_API_LOCAL_SM_PORT:-3004}:3000
    restart: on-failure
    environment:
      PORT: 3000
      POLYMESH_NODE_URL: ${POLYMESH_CHAIN_WS:-ws://polymesh-node:9944}
      POLYMESH_MIDDLEWARE_V2_URL: ${REST_MIDDLEWARE_URL:-http://subquery-graphql:3000}
      LOCAL_SIGNERS: 'alice,bob,charlie'
      LOCAL_MNEMONICS: '//Alice,//Bob,//Charlie'
      AUTH_STRATEGY: 'open'
      DEVELOPER_UTILS: true
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--spider',
          '-q',
          'http://polymesh-rest-api-local-sm:3000/network/latest-block',
        ]
      interval: 30s
      timeout: 5s
      retries: 10
      start_period: 30s

  polymesh-eth-rpc:
    image: ${POLYMESH_ETH_RPC_IMAGE:-paritypr/eth-rpc:stable2606-73b734d9}
    platform: ${POLYMESH_ETH_RPC_PLATFORM:-linux/amd64}
    profiles:
      - evm
    depends_on:
      polymesh-node:
        condition: service_healthy
    networks:
      - polymesh
    ports:
      - ${POLYMESH_ETH_RPC_PORT:-8545}:8545
    restart: on-failure
    command:
      - --node-rpc-url
      - ${POLYMESH_ETH_RPC_NODE_RPC_URL:-ws://polymesh-node:9944}
      - --rpc-port
      - '8545'
      - --rpc-external
      - --rpc-cors=all
      - --allow-unprotected-txs

  # Standalone local Ethereum node (Anvil) for the POLYX <-> wPOLYX bridge.
  # Separate from `polymesh-eth-rpc` (which is Polymesh's own EVM layer):
  # this is an independent chain that the bridge contracts live on.
  # Host port 8546 avoids the 8545 collision with polymesh-eth-rpc.
  eth-anvil:
    image: ${BRIDGE_ETH_ANVIL_IMAGE:-ghcr.io/foundry-rs/foundry:latest}
    profiles:
      - eth
    networks:
      - polymesh
    ports:
      - ${BRIDGE_ETH_RPC_PORT:-8546}:8545
    restart: unless-stopped
    # Override the image ENTRYPOINT (`/bin/sh -c`), which would mangle the
    # `--host 0.0.0.0` flag into a single shell word and bind Anvil to
    # 127.0.0.1 inside the container (unreachable from the host).
    entrypoint: ['anvil']
    command:
      - --host
      - 0.0.0.0
      - --port
      - '8545'
      - --chain-id
      - ${BRIDGE_ETH_CHAIN_ID:-1337}
      - --accounts
      - '10'
      - --balance
      - '10000'
      - --mnemonic
      - ${BRIDGE_ANVIL_MNEMONIC:-test test test test test test test test test test test junk}
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'cast chain-id --rpc-url http://127.0.0.1:8545 > /dev/null 2>&1 || exit 1',
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  blockscout-db:
    image: ${POLYMESH_BLOCKSCOUT_POSTGRES_IMAGE:-postgres:17}
    profiles:
      - evm
    networks:
      - polymesh
    restart: unless-stopped
    shm_size: 256m
    command: postgres -c "max_connections=200" -c "client_connection_check_interval=60000"
    environment:
      POSTGRES_DB: ${POLYMESH_BLOCKSCOUT_POSTGRES_DB:-blockscout}
      POSTGRES_USER: ${POLYMESH_BLOCKSCOUT_POSTGRES_USER:-blockscout}
      POSTGRES_PASSWORD: ${POLYMESH_BLOCKSCOUT_POSTGRES_PASSWORD:-blockscout}
    volumes:
      - blockscout-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          'CMD-SHELL',
          'pg_isready -U ${POLYMESH_BLOCKSCOUT_POSTGRES_USER:-blockscout} -d ${POLYMESH_BLOCKSCOUT_POSTGRES_DB:-blockscout}',
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  blockscout-redis:
    image: ${POLYMESH_BLOCKSCOUT_REDIS_IMAGE:-redis:alpine}
    profiles:
      - evm
    networks:
      - polymesh
    restart: unless-stopped
    command: redis-server
    volumes:
      - blockscout-redis-data:/data

  polymesh-blockscout:
    image: ${POLYMESH_BLOCKSCOUT_IMAGE:-ghcr.io/blockscout/blockscout:latest}
    profiles:
      - evm
    depends_on:
      polymesh-eth-rpc:
        condition: service_started
      blockscout-db:
        condition: service_healthy
      blockscout-redis:
        condition: service_started
    networks:
      - polymesh
    ports:
      - ${POLYMESH_BLOCKSCOUT_BACKEND_PORT:-4001}:4000
    restart: on-failure
    stop_grace_period: 5m
    command: >
      sh -c "bin/blockscout eval \"Elixir.Explorer.ReleaseTasks.create_and_migrate()\" && bin/blockscout start"
    extra_hosts:
      - 'host.docker.internal:host-gateway'
    environment:
      ETHEREUM_JSONRPC_VARIANT: ${POLYMESH_BLOCKSCOUT_RPC_VARIANT:-geth}
      ETHEREUM_JSONRPC_HTTP_URL: ${POLYMESH_BLOCKSCOUT_RPC_HTTP_URL:-http://polymesh-eth-rpc:8545/}
      ETHEREUM_JSONRPC_TRACE_URL: ${POLYMESH_BLOCKSCOUT_RPC_TRACE_URL:-http://polymesh-eth-rpc:8545/}
      ETHEREUM_JSONRPC_WS_URL: ${POLYMESH_BLOCKSCOUT_RPC_WS_URL:-ws://polymesh-eth-rpc:8545/}
      DATABASE_URL: postgresql://${POLYMESH_BLOCKSCOUT_POSTGRES_USER:-blockscout}:${POLYMESH_BLOCKSCOUT_POSTGRES_PASSWORD:-blockscout}@blockscout-db:5432/${POLYMESH_BLOCKSCOUT_POSTGRES_DB:-blockscout}
      ECTO_USE_SSL: ${POLYMESH_BLOCKSCOUT_ECTO_USE_SSL:-false}
      ECTO_SSL_MODE: ${POLYMESH_BLOCKSCOUT_ECTO_SSL_MODE:-disable}
      # Blockscout is a Phoenix (Elixir) app and requires SECRET_KEY_BASE to
      # sign session cookies/tokens. This is a throwaway value for local dev
      # only; override it via POLYMESH_BLOCKSCOUT_SECRET_KEY_BASE for any
      # non-local/shared deployment.
      SECRET_KEY_BASE: ${POLYMESH_BLOCKSCOUT_SECRET_KEY_BASE:-56NtB48ear7+wMSf0IQuWDAAazhpb31qyc7GiyspBP2vh7t5zlCsF5QDv76chXeN}
      PORT: 4000
      COIN: ${POLYMESH_BLOCKSCOUT_COIN:-POLYX}
      COIN_NAME: ${POLYMESH_BLOCKSCOUT_COIN_NAME:-POLYX}
      CHAIN_ID: ${POLYMESH_EVM_CHAIN_ID:-1641818}
      NETWORK: ${POLYMESH_BLOCKSCOUT_NETWORK:-Polymesh}
      SUBNETWORK: ${POLYMESH_BLOCKSCOUT_SUBNETWORK:-Polymesh Dev}
      INDEXER_DISABLE_PENDING_TRANSACTIONS_FETCHER: ${POLYMESH_BLOCKSCOUT_DISABLE_PENDING_TX_FETCHER:-true}
      DISABLE_MARKET: 'true'
      ACCOUNT_ENABLED: 'false'
      DISABLE_WEBAPP: 'false'
      API_V1_READ_METHODS_DISABLED: 'false'
      API_V1_WRITE_METHODS_DISABLED: 'false'
      RATE_LIMITER_REDIS_URL: redis://blockscout-redis:6379/0
      ACCOUNT_REDIS_URL: redis://blockscout-redis:6379
      RELEASE_LINK: ''
    volumes:
      - blockscout-logs:/app/logs
      - blockscout-dets:/app/dets

  polymesh-blockscout-frontend:
    image: ${POLYMESH_BLOCKSCOUT_FRONTEND_IMAGE:-ghcr.io/blockscout/frontend:latest}
    profiles:
      - evm
    depends_on:
      polymesh-blockscout:
        condition: service_started
    networks:
      - polymesh
    ports:
      - ${POLYMESH_BLOCKSCOUT_PORT:-4000}:3000
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_PROTOCOL: http
      NEXT_PUBLIC_API_HOST: ${POLYMESH_BLOCKSCOUT_FRONTEND_API_HOST:-localhost}
      NEXT_PUBLIC_API_PORT: ${POLYMESH_BLOCKSCOUT_BACKEND_PORT:-4001}
      NEXT_PUBLIC_API_BASE_PATH: /
      NEXT_PUBLIC_APP_PROTOCOL: http
      NEXT_PUBLIC_APP_HOST: ${POLYMESH_BLOCKSCOUT_FRONTEND_APP_HOST:-localhost}
      NEXT_PUBLIC_NETWORK_NAME: ${POLYMESH_BLOCKSCOUT_NETWORK:-Polymesh}
      NEXT_PUBLIC_NETWORK_SHORT_NAME: ${POLYMESH_BLOCKSCOUT_NETWORK_SHORT_NAME:-Polymesh}
      NEXT_PUBLIC_NETWORK_ID: ${POLYMESH_EVM_CHAIN_ID:-1641818}
      NEXT_PUBLIC_NETWORK_CURRENCY_NAME: ${POLYMESH_BLOCKSCOUT_COIN_NAME:-POLYX}
      NEXT_PUBLIC_NETWORK_CURRENCY_SYMBOL: ${POLYMESH_BLOCKSCOUT_COIN:-POLYX}
      NEXT_PUBLIC_NETWORK_CURRENCY_DECIMALS: ${POLYMESH_BLOCKSCOUT_COIN_DECIMALS:-18}
      NEXT_PUBLIC_IS_TESTNET: ${POLYMESH_BLOCKSCOUT_IS_TESTNET:-true}
      NEXT_PUBLIC_API_WEBSOCKET_PROTOCOL: ws
      # Required to enable in-browser wallet interaction (contract Write tab,
      # MetaMask, etc). Get a free project ID from https://cloud.reown.com
      NEXT_PUBLIC_WALLET_CONNECT_PROJECT_ID: ${POLYMESH_BLOCKSCOUT_WALLET_CONNECT_PROJECT_ID:-}

  vault:
    image: hashicorp/vault:${VAULT_VERSION:-latest}
    networks:
      - polymesh
    restart: unless-stopped
    ports:
      - ${VAULT_PORT:-8200}:8200
    volumes:
      - vault-volume:/vault/file:rw
      - vault-log-volume:/vault/logs:rw
    cap_add:
      - IPC_LOCK # Prevents secrets from swapping to disk
    configs:
      - source: vault-config
        target: /vault/config/vault.json
    entrypoint: vault server -config=/vault/config/vault.json

  # This will make sure vault is initialized and unsealed on the first run and unsealed on subsequent runs
  vault-init:
    image: hashicorp/vault:${VAULT_VERSION:-latest}
    user: '0:0'
    networks:
      - polymesh
    restart: 'no'
    depends_on:
      vault:
        condition: service_started
      postgres:
        condition: service_healthy
    volumes:
      - vault-root-token:/vault-token:rw
    # This will prevent the container from creating additional volumes
    tmpfs:
      - /vault/file
      - /vault/logs
    environment:
      VAULT_ADDR: 'http://vault:8200'
      PGPASSWORD: postgres
      PGUSER: postgres
      PGDATABASE: services_status
      PGHOST: postgres
    configs:
      - source: vault-init
        target: /opt/vault/init.sh
      - source: vault-init-dependencies
        target: /opt/vault/init-dependencies.sh
    entrypoint: /opt/vault/init-dependencies.sh

  environment-ready:
    image: alpine:latest
    volumes:
      - rest-api-accounts-init:/status:ro
    command: >
      sh -c '
        start_time=$$(date +%s)

        if [ -f /status/.setup-complete ]; then
          echo "************************************************************************************"
          echo "*** Environment previously initialized and is ready! *******************************"
          echo "************************************************************************************"
          exit 0
        else
          echo "************************************************************************************"
          echo "Environment starting... Waiting for initialization script to complete. *************"
          echo "Usually it takes less than 3 minutes to complete first time.           *************"
          echo "************************************************************************************"
          sleep 10
          while [ ! -f /status/.setup-complete ]; do
            current_time=$$(date +%s)
            elapsed_time=$$((current_time - start_time))
            echo "Still waiting for initialization... (Elapsed: $$elapsed_time s)"
            sleep 10
          done
          end_time=$$(date +%s)
          total_duration=$$((end_time - start_time))
          echo "************************************************************************************"
          echo "*** Polymesh Environment Ready! (Total initialization time: $$total_duration s) ***"
          echo "************************************************************************************"
          exit 0
        fi
      '
    restart: 'no'
    networks:
      - polymesh

configs:
  psql_extensions:
    external: false
    file: ./scripts/psql_extensions.sql
  polymesh-healthcheck-libp2p:
    external: false
    file: ./scripts/polymesh-healthcheck-libp2p.sh
  vault-config:
    external: false
    file: ./scripts/vault-config.json
  vault-init:
    external: false
    file: ./scripts/vault-init.sh
  vault-init-dependencies:
    external: false
    file: ./scripts/vault-init-dependencies.sh
  rest-api-accounts-init:
    external: false
    file: ./scripts/rest-api-accounts-init.sh

volumes:
  psql-data:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Indexer PostgreSQL data'
  chain-data:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Polymesh chain data'
  vault-volume:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Hashicorp Vault data'
  vault-log-volume:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Hashicorp Vault logs'
  vault-root-token:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Hashicorp Vault root token'
  rest-api-accounts-init:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=REST API signer init'
  blockscout-db-data:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Blockscout PostgreSQL data'
  blockscout-redis-data:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Blockscout Redis data'
  blockscout-logs:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Blockscout backend logs'
  blockscout-dets:
    labels:
      - 'network.polymesh.project=polymesh'
      - 'network.polymesh.description=Blockscout backend dets'
